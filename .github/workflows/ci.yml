name: CI

on:
  push:
  pull_request:

jobs:
  terraform-format:
    name: Terraform Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Check formatting
        working-directory: WebScraperInfra
        run: terraform fmt -recursive -check

  worker-format:
    name: Worker Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Check formatting
        working-directory: WebScraperWorker
        run: ./gradlew ktlintCheck

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [terraform-format]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: WebScraperAPI/requirements.txt

      - name: Install dependencies
        working-directory: WebScraperAPI
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: WebScraperAPI
        run: python -m pytest

  worker-tests:
    name: Worker Tests
    runs-on: ubuntu-latest
    needs: [worker-format]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run tests
        working-directory: WebScraperWorker
        run: ./gradlew test
