apiVersion: apps/v1
kind: Deployment
metadata:
  name: webscraper-api
  namespace: webscraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webscraper-api
  template:
    metadata:
      labels:
        app: webscraper-api
    spec:
      serviceAccountName: webscraper-sa
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: webscraper-secrets
      containers:
        - name: api
          image: 657083456388.dkr.ecr.us-west-1.amazonaws.com/webscraper/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webscraper-api
  namespace: webscraper
spec:
  type: ClusterIP
  selector:
    app: webscraper-api
  ports:
    - port: 8000
      targetPort: 8000
