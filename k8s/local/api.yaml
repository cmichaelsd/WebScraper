apiVersion: apps/v1
kind: Deployment
metadata:
  name: webscraper-api
  namespace: webscraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webscraper-api
  template:
    metadata:
      labels:
        app: webscraper-api
    spec:
      containers:
        - name: api
          image: webscraper/api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webscraper-api
  namespace: webscraper
spec:
  type: NodePort
  selector:
    app: webscraper-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
