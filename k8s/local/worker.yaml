apiVersion: apps/v1
kind: Deployment
metadata:
  name: webscraper-worker
  namespace: webscraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webscraper-worker
  template:
    metadata:
      labels:
        app: webscraper-worker
    spec:
      containers:
        - name: worker
          image: webscraper/worker:local
          imagePullPolicy: Never
          env:
            - name: JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: JDBC_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASSWORD
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
