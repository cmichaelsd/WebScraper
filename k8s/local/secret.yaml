apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: webscraper
type: Opaque
stringData:
  POSTGRES_USER: jobs
  POSTGRES_PASSWORD: jobs
  POSTGRES_DB: jobs
  DATABASE_URL: postgresql+asyncpg://jobs:jobs@job-db:5432/jobs
  JDBC_URL: jdbc:postgresql://job-db:5432/jobs
  DB_USER: jobs
  DB_PASSWORD: jobs
